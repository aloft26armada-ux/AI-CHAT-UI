  --fg:#e9eaf2; --muted:#9aa0b8; --border:#22263a;
  --accent:#7c5cff; --accent-2:#3cf2ff; --success:#2ef08d; --warn:#ffb84d; --danger:#ff5a6a;
  --s-1:.25rem; --s-2:.5rem; --s-3:.75rem; --s-4:1rem; --s-5:1.25rem; --s-6:1.5rem; --s-7:2rem; --s-8:3rem;
  --r-sm:.5rem; --r-md:.875rem; --r-lg:1.25rem; --r-full:999px;
  --text-xs:clamp(.72rem,.68rem + .2vw,.78rem);
  --text-sm:clamp(.84rem,.8rem + .25vw,.92rem);
  --text-base:clamp(.95rem,.9rem + .35vw,1.05rem);
  --text-lg:clamp(1.05rem,1rem + .45vw,1.2rem);
  --line:1.6; --max-msg:min(72ch,100%); --content-w:min(860px,100%);
  --glow-a:0 0 0 1px color-mix(in oklab,var(--accent) 30%,transparent),0 0 24px color-mix(in oklab,var(--accent) 35%,transparent);
  --glow-b:0 0 0 1px color-mix(in oklab,var(--accent-2) 25%,transparent),0 0 28px color-mix(in oklab,var(--accent-2) 30%,transparent);
  --shadow:0 10px 30px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04) inset;
}
*{box-sizing:border-box} html,body{height:100%}
html{scrollbar-gutter:stable;-webkit-text-size-adjust:100%}
body{margin:0;font-family:ui-sans-system,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif;font-size:var(--text-base);line-height:var(--line);color:var(--fg);background:var(--bg);overflow-x:hidden;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
.app{position:relative;display:flex;flex-direction:column;min-height:100dvh;min-height:100vh;isolation:isolate;overflow-x:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.bg{position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(1200px 600px at 20% -10%,#1a1d36 0%,transparent 60%),radial-gradient(900px 500px at 90% 0%,#132a33 0%,transparent 60%),var(--bg);overflow:hidden}
.bg__particles{position:absolute;inset:0;width:100%;height:100%;opacity:.55}
.bg__glow{position:absolute;border-radius:50%;filter:blur(42px);opacity:.9;will-change:transform}
.bg__glow--a{width:min(680px,90vw);height:min(680px,90vw);left:-12%;top:-18%;background:radial-gradient(closest-side,color-mix(in oklab,var(--accent) 55%,transparent),transparent 70%);animation:driftA 18s ease-in-out infinite alternate}
.bg__glow--b{width:min(560px,80vw);height:min(560px,80vw);right:-10%;top:-8%;background:radial-gradient(closest-side,color-mix(in oklab,var(--accent-2) 50%,transparent),transparent 72%);animation:driftB 22s ease-in-out infinite alternate}
.bg__grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;mask:radial-gradient(900px 600px at 50% 0%,black 60%,transparent 100%);opacity:.35}
.header{position:sticky;top:0;z-index:10;backdrop-filter:blur(14px) saturate(1.2);background:color-mix(in oklab,var(--bg) 82%,transparent);border-bottom:1px solid var(--border)}
.header__inner{width:var(--content-w);margin:0 auto;padding:var(--s-3) var(--s-4);display:flex;align-items:center;justify-content:space-between;gap:var(--s-4);max-width:100%}
.brand{display:flex;align-items:center;gap:var(--s-3);min-width:0}
.brand__orb{width:1.75rem;height:1.75rem;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),var(--accent-2),var(--accent));box-shadow:var(--glow-a);flex:0 0 auto;animation:spin 8s linear infinite}
.brand__title{font-size:var(--text-lg);font-weight:700;letter-spacing:-.02em;margin:0;white-space:nowrap}
.brand__badge{font-size:var(--text-xs);color:var(--muted);border:1px solid var(--border);padding:.2rem .5rem;border-radius:var(--r-full);background:color-mix(in oklab,var(--bg-elev) 90%,transparent);white-space:nowrap;max-width:28ch;overflow:hidden;text-overflow:ellipsis}
.header__actions{display:flex;align-items:center;gap:var(--s-2)}
.select{position:relative;display:inline-flex}
.select__input{appearance:none;background:var(--bg-elev);color:var(--fg);border:1px solid var(--border);border-radius:var(--r-full);padding:.55rem 2.2rem .55rem .9rem;font-size:var(--text-sm);min-height:44px;outline:none;box-shadow:var(--shadow)}
.select::after{content:"▾";position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.icon-btn{display:inline-grid;place-items:center;width:44px;height:44px;border-radius:var(--r-full);border:1px solid var(--border);background:var(--bg-elev);color:var(--fg);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--glow-a);border-color:color-mix(in oklab,var(--accent) 35%,var(--border))}
.icon-btn:active{transform:translateY(0)}
.icon-btn--send{background:linear-gradient(135deg,var(--accent),#5a8bff);border-color:transparent;color:white;box-shadow:var(--glow-a)}
.chat{flex:1 1 auto;display:flex;flex-direction:column;width:var(--content-w);margin:0 auto;max-width:100%;min-height:0;position:relative}
.chat__scroll{flex:1 1 auto;overflow:auto;overscroll-behavior:contain;padding:var(--s-6) var(--s-4) calc(var(--s-8) + 1rem);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.messages{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:var(--s-5)}
.msg{display:grid;grid-template-columns:2rem minmax(0,1fr);gap:var(--s-3);align-items:start;max-width:var(--max-msg);animation:msgIn .42s cubic-bezier(.2,.8,.2,1) both}
.msg[data-visible="false"]{opacity:0}
.msg--user{grid-template-columns:minmax(0,1fr) 2rem;justify-items:end;align-self:end}
.msg--user .msg__body{order:-1;background:linear-gradient(180deg,color-mix(in oklab,var(--bg-elev-2) 92%,transparent),var(--bg-elev));border:1px solid color-mix(in oklab,var(--accent) 18%,var(--border));box-shadow:var(--shadow)}
.msg__avatar{width:2rem;height:2rem;border-radius:50%;display:grid;place-items:center;font-size:.95rem;background:var(--bg-elev-2);border:1px solid var(--border);color:var(--muted);flex:0 0 auto}
.msg--user .msg__avatar{background:linear-gradient(135deg,var(--accent),#5a8bff);color:white;border-color:transparent;box-shadow:var(--glow-a)}
.msg__body{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s-3) var(--s-4);box-shadow:var(--shadow);min-width:0;overflow-wrap:anywhere}
.msg__meta{display:flex;gap:var(--s-2);align-items:baseline;margin-bottom:.2rem;font-size:var(--text-xs);color:var(--muted)}
.msg__role{color:var(--fg);font-weight:600;letter-spacing:.01em}
.msg__content{font-size:var(--text-base);line-height:1.65}
.msg__content p{margin:.35em 0}
.muted{color:var(--muted)}
.prose pre{background:#0e101a;border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--s-3);overflow:auto;font-size:.9em}
.prose code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em;background:rgba(255,255,255,.06);padding:.12em .32em;border-radius:.32em}
.prose pre code{background:transparent;padding:0}
.float{position:sticky;bottom:calc(var(--s-4) + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:var(--s-2);pointer-events:none;z-index:3;margin-top:-2.2rem;margin-bottom:.2rem}
.float__btn{pointer-events:auto;border-radius:var(--r-full);border:1px solid var(--border);background:color-mix(in oklab,var(--bg-elev) 92%,transparent);backdrop-filter:blur(12px);color:var(--fg);padding:.6rem .95rem;font-size:var(--text-sm);min-height:44px;box-shadow:var(--shadow),var(--glow-b);cursor:pointer;transition:transform .18s ease,opacity .18s ease}
.float__btn:hover{transform:translateY(-1px)}
.float__btn--ghost{background:transparent}
.composer-wrap{position:sticky;bottom:0;z-index:5;background:linear-gradient(to top,var(--bg) 70%,color-mix(in oklab,var(--bg) 20%,transparent));backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:var(--s-3) var(--s-4) calc(var(--s-3) + env(safe-area-inset-bottom))}
.composer{width:var(--content-w);max-width:100%;margin:0 auto;display:flex;flex-direction:column;gap:var(--s-2)}
.composer__field{display:flex;align-items:end;gap:var(--s-2);background:var(--bg-elev);border:1px solid var(--border);border-radius:calc(var(--r-lg) + 4px);padding:var(--s-2);box-shadow:var(--shadow);transition:border-color .18s ease,box-shadow .18s ease}
.composer__field:focus-within{border-color:color-mix(in oklab,var(--accent) 45%,var(--border));box-shadow:var(--glow-a)}
.composer__input{flex:1 1 auto;min-height:44px;max-height:min(28dvh,220px);resize:none;border:0;outline:0;background:transparent;color:var(--fg);font:inherit;font-size:var(--text-base);line-height:1.5;padding:.6rem .7rem;overflow:auto}
.composer__actions{display:flex;gap:var(--s-2);flex:0 0 auto}
.composer__hint{margin:0;font-size:var(--text-xs);color:var(--muted);padding-inline:.3rem;display:flex;justify-content:space-between;gap:.5rem}
.status{border-top:1px solid var(--border);background:color-mix(in oklab,var(--bg-elev) 88%,transparent)}
.status__inner{width:var(--content-w);max-width:100%;margin:0 auto;display:flex;align-items:center;gap:var(--s-3);padding:.55rem var(--s-4);font-size:var(--text-xs);color:var(--muted);min-height:40px;flex-wrap:wrap}
.status__dot{width:.58rem;height:.58rem;border-radius:50%;background:var(--muted);box-shadow:0 0 0 3px color-mix(in oklab,var(--muted) 20%,transparent);transition:background .25s ease,box-shadow .25s ease;flex:0 0 auto}
.status__dot[data-state="ready"]{background:var(--success);box-shadow:0 0 10px var(--success)}
.status__dot[data-state="loading"],.status__dot[data-state="downloading"],.status__dot[data-state="initializing"]{background:var(--accent-2);box-shadow:0 0 10px var(--accent-2);animation:pulse 1.2s ease-in-out infinite}
.status__dot[data-state="inference"]{background:#8b7bff;box-shadow:0 0 10px #8b7bff;animation:pulse 1s ease-in-out infinite}
.status__dot[data-state="failed"],.status__dot[data-state="unsupported"],.status__dot[data-state="gpu_unavailable"]{background:var(--danger);box-shadow:0 0 10px var(--danger)}
.status__progress{width:92px;height:6px;border-radius:var(--r-full);accent-color:var(--accent-2)}
.status__spacer{flex:1 1 auto}
.status__meta{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status__retry{border:1px solid var(--border);background:var(--bg-elev-2);color:var(--fg);border-radius:var(--r-full);padding:.32rem .7rem;font-size:var(--text-xs);min-height:32px;cursor:pointer}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;border-radius:2px}
@keyframes driftA{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(28px,22px,0) scale(1.06)}}
@keyframes driftB{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(-24px,18px,0) scale(1.08)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.88)}}
@media (max-width:480px){
 .header__inner{padding:var(--s-2) var(--s-3)}
 .brand__badge{display:none}
 .chat__scroll{padding:var(--s-4) var(--s-3) calc(var(--s-7) + 1rem)}
 .msg{grid-template-columns:1.6rem minmax(0,1fr);gap:var(--s-2)}
 .msg--user{grid-template-columns:minmax(0,1fr) 1.6rem}
 .msg__avatar{width:1.6rem;height:1.6rem;font-size:.8rem}
 .status__meta{display:none}
}
@media (max-width:390px){ .select__input{max-width:38vw;text-overflow:ellipsis} }
@media (max-width:360px){ .composer__hint{display:none} }
@media (max-width:320px){ .header__actions{gap:var(--s-1)} .icon-btn{width:40px;height:40px} }
@media (max-height:520px) and (orientation:landscape){
 .chat__scroll{padding-top:var(--s-3);padding-bottom:var(--s-3)}
 .composer__input{max-height:22dvh}
 .float{bottom:.5rem}
}
@media (prefers-reduced-motion:reduce){
 *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
 .bg__glow{filter:none}
}
@media (prefers-contrast:more){ :root{--border:#3a3f62} .msg__body,.composer__field{border-width:2px} }
